config:
  device-name: "pi"
  mode: "ssh"
  url: "xxxxxxx"
  port: "22"
  username: "pi"
  auth-method: "password"
  password: "passwordtest"
  pool-size: 1
  max-retries: 3
  retry-delay: 2

chip:
  digital-pins: []

  pwm-pins:
    - id: "buzzer"
      pin: 18
      frequency: 1000
      duty-cycle: 0

  i2c-devices:
    - id: "weather"
      type: "bmp280"
      bus: 1
      address: "0x76"

mqtt:
  broker: "tcp://xxxxxxx:1883"
  client-id: "pioneer-pi"
  topic: "pioneer"
  username: ""
  password: ""
  use-tls: false
  qos: 1
