config:
  device-name: "pi"
  url: "192.168.1.11"
  port: "22"
  auth-method: "password"
  password: "11"
  # For production use key auth instead:
  # auth-method: "key"
  # ssh-key-path: "/home/youruser/.ssh/id_rsa"
  # ssh-known-hosts: "/home/youruser/.ssh/known_hosts"
  pool-size: 3
  max-retries: 5
  retry-delay: 3

chip:
  pwm-pins:
    - id: "pwm-fan"
      pin: 18
      frequency: 1000
      duty-cycle: 0
  i2c-devices:
    - id: "i2c-sensor"
      bus: 1
      address: "0x48"
mqtt:
  broker: "tcp://192.168.1.64:1883"
  client-id: "pioneer-pi"
  topic: "pioneer"
  username: ""
  password: ""
  use-tls: false
  qos: 1
